version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
  
  post_build:
    commands:
      - echo "Deploying with force-replacement of metadata..."
      
      # 1. Sync EVERYTHING first so files exist
      - aws s3 sync . s3://csce412leenser.me/ --exclude ".git/*" --exclude "buildspec.yml"
      
      # 2. FORCE index.html to be text/html and REPLACE existing metadata
      - aws s3 cp index.html s3://csce412leenser.me/index.html --content-type "text/html" --metadata-directive REPLACE
      
      # 3. Invalidate CloudFront
      - aws cloudfront create-invalidation --distribution-id E13H7QB4MBMQ3A --paths "/*"

# IMPORTANT: Remove the 'artifacts' section if you are using 'aws s3 sync' in the buildspec
# If CodePipeline has a "Deploy" stage after this, it will overwrite your manual upload.