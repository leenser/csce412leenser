version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18  # or whatever runtime you're using
  
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      # Add any pre-build commands here
  
  build:
    commands:
      - echo Build started on `date`
      # Add your build commands here
      - echo Build completed on `date`
  
  post_build:
    commands:
      - echo Build completed on `date`
      # Deploy with correct content-types
      - echo "Deploying to S3 with correct content-types..."
      
      # First, sync all non-HTML files
      - aws s3 sync . s3://csce412leenser.me/ --delete --exclude "*.html" --exclude "buildspec.yml" --exclude ".git/*"
      
      # Then, sync HTML files with correct content-type
      - aws s3 sync . s3://csce412leenser.me/ --exclude "*" --include "*.html" --content-type "text/html"
      
      # Invalidate CloudFront cache
      - aws cloudfront create-invalidation --distribution-id E13H7QB4MBMQ3A --paths "/*"

artifacts:
  files:
    - '**/*'
